<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smethwick Town Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OpenLayers CSS -->
  <link rel="stylesheet" href="resources/ol.css" type="text/css">
  <link rel="stylesheet" href="resources/ol-layerswitcher.css" type="text/css">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- OpenLayers JS -->
<script src="resources/ol.js"></script>
<script src="resources/ol-layerswitcher.js"></script>

<script>
  // Create map
  var map = new ol.Map({
    target: 'map',
    layers: [
      new ol.layer.Tile({
        source: new ol.source.OSM()
      })
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([-1.994, 52.502]),
      zoom: 14
    })
  });

  // Add your available layers safely

  // Example: SmethwickCanals_0
  if (typeof SmethwickCanals_0 !== "undefined") {
    var canalsLayer = new ol.layer.Vector({
      source: new ol.source.Vector({
        features: new ol.format.GeoJSON().readFeatures(SmethwickCanals_0)
      })
    });
    map.addLayer(canalsLayer);
  }

  // Example: CemeterySmethwick_2
  if (typeof CemeterySmethwick_2 !== "undefined") {
    var cemeteryLayer = new ol.layer.Vector({
      source: new ol.source.Vector({
        features: new ol.format.GeoJSON().readFeatures(CemeterySmethwick_2)
      })
    });
    map.addLayer(cemeteryLayer);
  }

  // Repeat the above pattern for all layers you actually have
  // Do NOT include SmethwickTownGreenspace_1 if it is missing
</script>

<!-- Layer data -->
<script src="layers/SmethwickCanals_0.js"></script>
<!-- <script src="layers/json_SmethwickTownGreenspace_1.js"></script> --> <!-- Missing, safely skipped -->
<script src="layers/CemeterySmethwick_2.js"></script>
<script src="layers/SmethwickTownBuildings_3.js"></script>
<script src="layers/SmethwickTownCrimeJan25Jan26_4.js"></script>
<script src="layers/SmethwickTownFlyTipping_5.js"></script>
<script src="layers/SmethwickRoads_6.js"></script>
<script src="layers/CommunityFacilityWorks_7.js"></script>
<script src="layers/CemeteryPlannedWorks_8.js"></script>
<script src="layers/SmethwickTown_9.js"></script>

</body>
</html>
