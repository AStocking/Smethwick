<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smethwick Town Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OpenLayers CSS -->
  <link rel="stylesheet" href="resources/ol.css" type="text/css">
  <link rel="stylesheet" href="resources/ol-layerswitcher.css" type="text/css">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- OpenLayers JS -->
<script src="resources/ol.js"></script>
<script src="resources/ol-layerswitcher.js"></script>

<!-- Layer data files (load these first!) -->
<script src="layers/SmethwickCanals_0.js"></script>
<!-- <script src="layers/json_SmethwickTownGreenspace_1.js"></script> --> <!-- Missing, safely skipped -->
<script src="layers/CemeterySmethwick_2.js"></script>
<script src="layers/SmethwickTownBuildings_3.js"></script>
<script src="layers/SmethwickTownCrimeJan25Jan26_4.js"></script>
<script src="layers/SmethwickTownFlyTipping_5.js"></script>
<script src="layers/SmethwickRoads_6.js"></script>
<script src="layers/CommunityFacilityWorks_7.js"></script>
<script src="layers/CemeteryPlannedWorks_8.js"></script>
<script src="layers/SmethwickTown_9.js"></script>

<script>
  // Initialize map
  var map = new ol.Map({
    target: 'map',
    layers: [
      new ol.layer.Tile({
        source: new ol.source.OSM()
      })
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([-1.994, 52.502]),
      zoom: 14
    })
  });

  // Function to safely add a layer if it exists
  function addLayerIfExists(layerVar, styleFunc) {
    if (typeof layerVar !== "undefined") {
      var vectorLayer = new ol.layer.Vector({
        source: new ol.source.Vector({
          features: new ol.format.GeoJSON().readFeatures(layerVar)
        }),
        style: styleFunc || undefined
      });
      map.addLayer(vectorLayer);
    }
  }

  // Add all available layers
  addLayerIfExists(SmethwickCanals_0);
  addLayerIfExists(CemeterySmethwick_2);
  addLayerIfExists(SmethwickTownBuildings_3);
  addLayerIfExists(SmethwickTownCrimeJan25Jan26_4);
  addLayerIfExists(SmethwickTownFlyTipping_5);
  addLayerIfExists(SmethwickRoads_6);
  addLayerIfExists(CommunityFacilityWorks_7);
  addLayerIfExists(CemeteryPlannedWorks_8);
  addLayerIfExists(SmethwickTown_9);
  // SmethwickTownGreenspace_1 is missing, safely skipped
</script>

</body>
</html>
