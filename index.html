<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smethwick Town Web Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-sA+e2Q1Ff1JC1lCUnHgJxNqJ1X57WT+a2F5f5DYG0/k=" crossorigin=""/>

  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-o9N1j8oLJbM1q6jMtnL0D9DJH1i2fQmZrb+/f1hx0V8=" crossorigin=""></script>

<!-- Main layers script (optional, keep if you have layers.js) -->
<!-- <script src="layers.js"></script> -->

<!-- Optional: your custom JS -->
<script src="js/main.js"></script>

<script>
  // Initialize Leaflet map
  var map = L.map('map').setView([52.502, -1.994], 14);

  // Add a base map (OpenStreetMap)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // No additional layers for now
</script>

</body>
</html>
