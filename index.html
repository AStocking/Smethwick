<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smethwick Town Web Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-sA+e2Q1Ff1JC1lCUnHgJxNqJ1X57WT+a2F5f5DYG0/k=" crossorigin=""/>

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-o9N1j8oLJbM1q6jMtnL0D9DJH1i2fQmZrb+/f1hx0V8=" crossorigin=""></script>

<!-- Layer data files exported from QGIS2Web -->
<script src="layers/json_SmethwickTownGreenspace_1.js"></script>
<script src="layers/json_OtherLayer_2.js"></script> <!-- add other layers if needed -->

<!-- Main layers script -->
<script src="layers.js"></script>

<!-- Optional: your custom JS -->
<script src="js/main.js"></script>

<script>
  // Initialize Leaflet map
  var map = L.map('map').setView([52.502, -1.994], 14); // adjust center/zoom

  // Add a base map (OpenStreetMap)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Add your layers from layers.js (these variables are defined in the JSON files above)
  if (typeof SmethwickTownGreenspace_1 !== "undefined") {
    L.geoJSON(SmethwickTownGreenspace_1, {
      style: {color: "#00FF00", weight: 2},
      onEachFeature: function(feature, layer) {
        if (feature.properties && feature.properties.name) {
          layer.bindPopup(feature.properties.name);
        }
      }
    }).addTo(map);
  }

  // Repeat for other layers as needed
</script>

</body>
</html>
